name: Uruchamiaj slotchecker 5 razy dziennie

on:
    schedule:
    # 8:00, 11:00, 14:00, 17:00, 20:00 czasu UTC (na razie przykładowo)
    - cron: "*/5 * * * *"

jobs:
  run-slotchecker:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Zainstaluj Pythona
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Zainstaluj zależności
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Uruchom slotchecker w trybie automatycznym
        run: python slotchecker.py --auto

      - name: Zapisz wygenerowany CSV jako artifact
        uses: actions/upload-artifact@v4
        with:
          name: ikea_slots_results
          path: ikea_slots_results.csv
